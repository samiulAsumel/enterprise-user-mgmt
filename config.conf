# ════════════════════════════════════════════════════════════════════════════
# Enterprise User & Group Management — Configuration  v1.0.0
# Edit this file to match your environment.  Sourced by all modules.
# ════════════════════════════════════════════════════════════════════════════

# ── User creation defaults ────────────────────────────────────────────────────
DEFAULT_SHELL="/bin/bash"
DEFAULT_HOME_BASE="/home"
DEFAULT_SKEL="/etc/skel"
CREATE_MAIL_SPOOL=false             # true | false
USER_UMASK="022"                    # file creation mask for new users

# ── Group defaults ────────────────────────────────────────────────────────────
DEFAULT_GID_MIN=1000
DEFAULT_GID_MAX=60000
SYSTEM_GROUP_GID_MAX=999            # GIDs ≤ this are considered system groups

# ── Bulk user manifest (CSV format) ──────────────────────────────────────────
# Format: username,uid,primary_group,secondary_groups,shell,comment
# Leave UID blank to auto-assign.  Multiple secondary groups: "grp1:grp2"
USER_MANIFEST="${SCRIPT_DIR}/data/users.csv"

# ── Bulk group manifest (CSV format) ─────────────────────────────────────────
# Format: groupname,gid,members
# Leave GID blank to auto-assign.  Multiple members: "user1:user2"
GROUP_MANIFEST="${SCRIPT_DIR}/data/groups.csv"

# ── sudo configuration ────────────────────────────────────────────────────────
SUDOERS_DIR="/etc/sudoers.d"
SUDOERS_FILE_OWNER="root:root"
SUDOERS_FILE_MODE="0440"
# Groups granted full sudo (comma-separated)
SUDO_ADMIN_GROUPS="wheel,sudo_admins"
# Groups granted restricted sudo (defined in sudo_config.sh rules)
SUDO_OPS_GROUPS="ops_team,deploy_team"
# Require tty for sudo sessions
SUDO_REQUIRE_TTY=true
# Log all sudo commands to syslog
SUDO_LOG_OUTPUT=true
# sudo session timeout in minutes (0 = ask every time)
SUDO_TIMESTAMP_TIMEOUT=15

# ── Password policy (system-wide via PAM + login.defs) ────────────────────────
PWQ_MINLEN=12                       # minimum password length
PWQ_DCREDIT=-1                      # ≥1 digit required  (-N means "at least N")
PWQ_UCREDIT=-1                      # ≥1 uppercase required
PWQ_LCREDIT=-1                      # ≥1 lowercase required
PWQ_OCREDIT=-1                      # ≥1 special character required
PWQ_MINCLASS=3                      # minimum character classes
PWQ_MAXREPEAT=3                     # max consecutive identical characters
PWQ_MAXCLASSREPEAT=4                # max consecutive chars from same class
PWQ_GECOSCHECK=1                    # reject passwords similar to GECOS field
PWQ_DICTCHECK=1                     # reject dictionary words
PWQ_ENFORCE_FOR_ROOT=1              # enforce policy for root as well
PWQ_RETRY=3                         # password entry retry count
PWQ_REMEMBER=5                      # remember N old passwords (pam_pwhistory)

# ── Password aging defaults (login.defs) ──────────────────────────────────────
PASS_MAX_DAYS=90                    # maximum password age in days
PASS_MIN_DAYS=1                     # minimum days before password can be changed
PASS_WARN_AGE=14                    # days before expiry to warn user
PASS_INACTIVE_DAYS=30               # days after expiry before account is disabled
# Per-user aging is defined in data/aging.csv

# ── Per-user aging manifest (CSV) ────────────────────────────────────────────
# Format: username,max_days,min_days,warn_days,inactive_days,expire_date
# expire_date format: YYYY-MM-DD or empty for never
AGING_MANIFEST="${SCRIPT_DIR}/data/aging.csv"

# ── Account locking (faillock) ────────────────────────────────────────────────
FAILLOCK_ENABLED=true
FAILLOCK_DENY=5                     # lock after N failures
FAILLOCK_FAIL_INTERVAL=900          # failure window in seconds (15 min)
FAILLOCK_UNLOCK_TIME=600            # auto-unlock after N seconds (0 = never)
FAILLOCK_AUDIT=true                 # emit audit records
FAILLOCK_SILENT=false               # suppress informational messages
FAILLOCK_NO_LOG_INFO=false          # suppress successful login log entries
FAILLOCK_EVEN_DENY_ROOT=false       # also lock root account on failures
FAILLOCK_ROOT_UNLOCK_TIME=60        # shorter auto-unlock for root

# Manual lock/unlock manifest: username,action (lock|unlock)
LOCK_MANIFEST="${SCRIPT_DIR}/data/locks.csv"

# ── Audit report ─────────────────────────────────────────────────────────────
REPORT_DIR="/var/log/user-mgmt/reports"
REPORT_FORMAT="both"                # html | text | both
REPORT_EMAIL=""                     # send report to this address (empty = no email)
SMTP_SERVER="localhost"
SMTP_PORT=25
REPORT_TITLE="Enterprise User & Group Management Audit"

# ── Logging ───────────────────────────────────────────────────────────────────
LOG_DIR="/var/log/user-mgmt"
LOG_FILE="${LOG_DIR}/user_mgmt.log"
LOG_LEVEL="INFO"                    # DEBUG | INFO | WARN | ERROR
SYSLOG_FACILITY="authpriv"          # syslog facility for security-relevant events

# ── Installation paths ────────────────────────────────────────────────────────
INSTALL_DIR="/usr/local/bin/user-mgmt"
SERVICE_USER="root"                 # script must run as root
